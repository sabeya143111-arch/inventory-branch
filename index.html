<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swag Inventory — Control Center</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.4.0/lib/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080A0E;--surface:#0E1117;--surface2:#151B24;--surface3:#1C2433;
  --border:#1E2A3A;--border2:#243040;--text:#F6F9FF;--muted:#4A6080;--muted2:#6A8090;
  --accent:#00D9FF;--accent2:#0099CC;--green:#00FF88;--red:#FF3366;--amber:#FFB020;
  --purple:#8B5CF6;--gold:#D4A84B;--card-glass:rgba(14,17,23,0.70);
}
[data-theme="light"] {
  --bg:#F4F6FB;--surface:#FFFFFF;--surface2:#F0F3F9;--surface3:#E4E9F2;
  --border:#DCE3EF;--border2:#C9D3E3;--text:#16202E;--muted:#6A7A92;--muted2:#4A5A72;
  --accent:#0091B5;--accent2:#006C88;--green:#00A35A;--red:#D6224A;--amber:#C77F00;
  --purple:#6D44C9;--gold:#A9821F;--card-glass:rgba(255,255,255,0.82);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,217,255,.04),transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(139,92,246,.04),transparent 70%);pointer-events:none;z-index:0}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;position:relative;z-index:10}
.login-card{position:relative;z-index:3;background:var(--card-glass);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:24px;padding:48px 48px 56px;text-align:center;max-width:420px;width:90%;box-shadow:0 0 90px rgba(0,217,255,.08),0 40px 80px rgba(0,0,0,.45);animation:loginFade .6s ease}
@keyframes loginFade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 12px 30px rgba(0,217,255,.3)}
.login-logo svg{width:36px;height:36px;stroke:#080A0E;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.login-brand{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.login-title{font-size:26px;font-weight:300;margin-bottom:8px;letter-spacing:.5px}
.login-divider{width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto 24px}
.login-sub{font-size:14px;color:var(--muted2);margin-bottom:34px;line-height:1.7}
.login-btn{width:100%;padding:15px;background:rgba(0,217,255,.05);border:1px solid rgba(0,217,255,.2);border-radius:9999px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all .3s}
.login-btn:hover{background:rgba(0,217,255,.1);border-color:rgba(0,217,255,.45);box-shadow:0 0 24px rgba(0,217,255,.12)}
[data-theme="light"] .login-logo svg{stroke:#fff}

/* HEADER */
.header{background:var(--card-glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;transition:background .3s}
.header-left{display:flex;align-items:center;gap:16px}
.header-brand{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px}
.header-sep{width:1px;height:20px;background:var(--border2)}
.header-sub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:livePulse 2s infinite;box-shadow:0 0 8px var(--green)}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header-right{display:flex;align-items:center;gap:10px}
.user-chip{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:6px 14px 6px 10px;font-size:12px;color:var(--muted2);display:flex;align-items:center;gap:8px}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#080A0E}
.hdr-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:7px 13px;color:var(--muted2);font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}
.hdr-btn.danger:hover{border-color:var(--red);color:var(--red)}
.ico{width:1em;height:1em;display:inline-block;vertical-align:-.15em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 28px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-item{padding:14px 18px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:7px;letter-spacing:.3px}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-badge{background:var(--surface3);border-radius:10px;padding:1px 7px;font-size:10px;font-family:'Space Mono',monospace;color:var(--muted2)}
.nav-item.active .nav-badge{background:rgba(0,217,255,.1);color:var(--accent)}

/* MAIN */
.main{padding:24px 28px;max-width:1500px;margin:0 auto;position:relative;z-index:1}
.page{display:none}.page.active{display:block;animation:pageIn .2s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.topbar-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#080A0E;box-shadow:0 4px 15px rgba(0,217,255,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,217,255,.35)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;transition:opacity .2s}
.stat-card.c1::after{background:var(--accent)}.stat-card.c2::after{background:var(--amber)}.stat-card.c3::after{background:var(--purple)}
.stat-card.c4::after{background:var(--green)}.stat-card.c5::after{background:var(--gold)}.stat-card.c6::after{background:var(--red)}
.stat-card:hover{transform:translateY(-3px);border-color:var(--border2)}
.stat-icon{font-size:20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.stat-num{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;line-height:1;margin-bottom:6px}
.c1 .stat-num{color:var(--accent)}.c2 .stat-num{color:var(--amber)}.c3 .stat-num{color:var(--purple)}
.c4 .stat-num{color:var(--green)}.c5 .stat-num{color:var(--gold)}.c6 .stat-num{color:var(--red)}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.table-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.table-count{background:var(--surface3);border-radius:20px;padding:2px 10px;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted2)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
thead{background:var(--surface2)}
th{padding:11px 16px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;font-family:'Space Mono',monospace}
td{padding:13px 16px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle}
tr{transition:background .1s}tr:hover td{background:rgba(0,217,255,.02)}
[data-theme="dark"] td{color:#FFFFFF!important;font-weight:700;font-size:14px}
[data-theme="dark"] th{color:#AEBED2}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;font-family:'Space Mono',monospace}
.b-dot{width:4px;height:4px;border-radius:50%}
.b-use{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2)}.b-use .b-dot{background:var(--green)}
.b-stop{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.2)}.b-stop .b-dot{background:var(--red)}
.b-fix{background:rgba(255,176,32,.1);color:var(--amber);border:1px solid rgba(255,176,32,.2)}.b-fix .b-dot{background:var(--amber)}
.b-store{background:rgba(96,165,250,.1);color:#60A5FA;border:1px solid rgba(96,165,250,.2)}.b-store .b-dot{background:#60A5FA}
.b-def{background:var(--surface3);color:var(--muted);border:1px solid var(--border)}
.id-tag{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);background:var(--surface2);padding:3px 8px;border-radius:6px;border:1px solid var(--border)}
.view-btn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Space Grotesk',sans-serif;display:inline-flex;align-items:center;gap:4px}
.view-btn:hover{border-color:var(--accent);color:var(--accent)}

/* FILTERS */
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.flt-group{display:flex;flex-direction:column;gap:5px}
.flt-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'Space Mono',monospace}
.flt-input,.flt-select{background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;padding:8px 12px;outline:none;min-width:130px;transition:border-color .15s}
.flt-input:focus,.flt-select:focus{border-color:var(--accent)}
.flt-select option{background:var(--surface2)}

/* BRANCH CARDS */
.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:20px}
.branch-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.branch-card:hover{transform:translateY(-4px);border-color:rgba(0,217,255,.4);box-shadow:0 20px 40px rgba(0,0,0,.3)}
.branch-card .brand-badge{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;color:#fff}
.branch-card h3{font-size:17px;font-weight:700;margin:12px 0 4px}
.branch-qty{position:absolute;top:16px;right:18px;text-align:right}
.branch-qty b{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);display:block;line-height:1}
.branch-qty span{font-size:10px;color:var(--muted)}
.branch-footer{border-top:1px dashed var(--border);padding-top:12px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.cat-chips{display:flex;gap:5px;flex-wrap:wrap}
.cat-chip{font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted2);padding:2px 8px;border-radius:6px}
.barcode{display:flex;gap:2px;height:22px;margin:12px 0 10px;opacity:.4}
.barcode i{display:block;background:var(--text);border-radius:1px}

/* ASSET CARDS */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:20px}
.asset-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.asset-card:hover{transform:translateY(-3px);border-color:rgba(0,217,255,.4);box-shadow:0 15px 35px rgba(0,0,0,.25)}
.asset-thumb{height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative}
.asset-thumb svg{width:44px;height:44px;stroke:var(--muted);fill:none;stroke-width:1.5}
.asset-qty-pill{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;backdrop-filter:blur(4px)}
.asset-body{padding:12px 14px 14px}
.asset-body h5{font-size:14px;font-weight:700;margin-bottom:3px}
.asset-model{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px;min-height:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.color-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex:none}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.chart-header{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;font-family:'Space Mono',monospace}
.chart-wrap{position:relative;height:200px}

/* KPI */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.kpi-val{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);line-height:1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.3px}
[data-theme="dark"] .kpi-lbl{color:#B7C3D4;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(8,10,14,.85);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:32px;min-width:380px;max-width:500px;width:90%;animation:modalIn .25s ease;box-shadow:0 40px 80px rgba(0,0,0,.5)}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-info{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:12px}
.modal-info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.modal-info-row:last-child{border:none}
.modal-info-label{color:var(--muted)}
.modal-info-val{font-weight:600;font-family:'Space Mono',monospace}
[data-theme="dark"] .modal-info-val{color:#FFFFFF!important;font-weight:700}
.modal-footer{display:flex;gap:10px;justify-content:flex-end}
.modal-input,.modal-select,.modal-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;padding:11px 14px;outline:none;margin-bottom:14px;transition:border-color .15s}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--accent)}
.modal-textarea{resize:none;height:80px}
.modal-select option{background:var(--surface2)}
.modal-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-family:'Space Mono',monospace}

/* LOADING / EMPTY */
.loading{text-align:center;padding:40px;color:var(--muted)}
.spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--muted)}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:13px;min-width:250px;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-color:rgba(0,255,136,.3)}.toast.error{border-color:rgba(255,51,102,.3)}.toast.info{border-color:rgba(0,217,255,.3)}

/* PAGINATION */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:14px;align-items:center}
.pg-btn{background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:12px;padding:6px 12px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:#080A0E;font-weight:700}
.pg-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* BRANCH DETAIL */
.bdetail-header{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.bdetail-header .l{flex:1;min-width:200px}
.bdetail-header h2{font-size:22px;font-weight:700;margin:8px 0 4px}
.mini-stats{display:flex;gap:24px;flex-wrap:wrap}
.ms-item{text-align:center}
.ms-item b{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);display:block}
.ms-item span{font-size:11px;color:var(--muted)}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pill{background:var(--surface);border:1px solid var(--border);color:var(--muted2);font-size:12px;font-weight:500;padding:7px 14px;border-radius:999px;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--accent)}.pill.active{background:var(--accent);border-color:var(--accent);color:#04222a}
.pill .n{font-family:'Space Mono',monospace;opacity:.6;margin-left:5px;font-size:11px}
.cat-section{margin-bottom:24px}
.cat-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cat-dot{width:10px;height:10px;border-radius:3px;flex:none}
.cat-bar h4{font-size:14px;font-weight:700;margin:0}
.cat-bar .meta{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto}
.back-btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);color:var(--muted2);font-size:13px;font-weight:500;padding:8px 14px;border-radius:10px;cursor:pointer;margin-bottom:16px;transition:all .15s;font-family:'Space Grotesk',sans-serif}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.kpi-strip{grid-template-columns:repeat(2,1fr)}.branch-grid{grid-template-columns:1fr}.asset-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">

  await getToken();

  if(!r.ok)throw new Error(`SP ${r.status}`);
  const d=await r.json();
  return d.value||[];
}

// ===== HELPERS =====
function fmt(n){return new Intl.NumberFormat('en-US').format(n||0)}
function fmtMoney(n){return n?fmt(n)+' SAR':'—'}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}catch(_){return d}}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function statusBadge(s){
  const v=(s||'').toLowerCase();
  if(v.includes('استخدام'))return`<span class="badge b-use"><span class="b-dot"></span>${esc(s)}</span>`;
  if(v.includes('متوقف')||v.includes('تالف'))return`<span class="badge b-stop"><span class="b-dot"></span>${esc(s)}</span>`;
  if(v.includes('صيان'))return`<span class="badge b-fix"><span class="b-dot"></span>${esc(s)}</span>`;
  if(v.includes('مخزن')||v.includes('احتياط'))return`<span class="badge b-store"><span class="b-dot"></span>${esc(s)}</span>`;
  if(!s)return`<span class="badge b-def">—</span>`;
  return`<span class="badge b-def"><span class="b-dot"></span>${esc(s)}</span>`;
}

function barcode(seed){let h=0;for(const c of String(seed))h=(h*33+c.charCodeAt(0))>>>0;let s='';for(let i=0;i<28;i++){h=(h*1103515245+12345)>>>0;s+=`<i style="flex:${1+(h%3)}"></i>`}return`<div class="barcode">${s}</div>`}

function getBranchAgg(){
  const m={};
  allAssets.forEach(d=>{
    if(!m[d.branch])m[d.branch]={brand:d.brand,types:0,units:0,value:0,cats:{},last:d.created};
    const b=m[d.branch];b.types++;b.units+=d.qty;b.value+=d.amount*d.qty;b.cats[d.category]=(b.cats[d.category]||0)+1;
  });
  return m;
}

  currentTab=tab;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+tab)?.classList.add('active');
  buildNav();
  if(tab==='overview')renderOverview();
  else if(tab==='branches'){activeBranch=null;activeCat='All';renderBranches()}
  else if(tab==='all'){currentPage=1;renderAll()}
  else if(tab==='analytics')renderAnalytics();
}

function sortAll(key){if(sortState.key===key)sortState.dir*=-1;else{sortState.key=key;sortState.dir=1}currentPage=1;renderAll()}
function buildPagination(total){
  if(total<=1)return'';
  let h='';
  if(currentPage>1)h+=`<button class="pg-btn" onclick="goPg(${currentPage-1})">←</button>`;
  for(let i=1;i<=Math.min(total,7);i++)h+=`<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPg(${i})">${i}</button>`;
  if(total>7)h+=`<span style="color:var(--muted);font-size:11px">... ${total}</span>`;
  if(currentPage<total)h+=`<button class="pg-btn" onclick="goPg(${currentPage+1})">→</button>`;
  return h;
}
function goPg(p){currentPage=p;renderAll()}
function clearAllFilters(){sortState={key:null,dir:1};currentPage=1;renderAll()}

function openDetail(id){
  const d=allAssets.find(x=>x.id===id);if(!d)return;
  const rows=[['Branch',d.branch],['Category',d.category],['Model',d.model||'—'],['Status',d.status||'—'],['Color',d.color||'—'],['Quantity',d.qty],['Amount',fmtMoney(d.amount)],['Total Value',fmtMoney(d.amount*d.qty)],['Invoice',d.invoice||'—'],['Purchase Date',fmtDate(d.purchaseDate)]];
  document.getElementById('modal-detail-body').innerHTML=`
    <div class="modal-info">
      <div class="modal-info-row"><span class="modal-info-label">Asset Name</span><span class="modal-info-val">${esc(d.name)}</span></div>
      ${rows.map(([k,v])=>`<div class="modal-info-row"><span class="modal-info-label">${esc(k)}</span><span class="modal-info-val">${esc(String(v))}</span></div>`).join('')}
    </div>
    ${d.notes?`<div class="modal-label">Notes</div><div style="background:var(--surface2);border-radius:10px;padding:12px;font-size:13px;line-height:1.6;color:var(--text)">${esc(d.notes)}</div>`:''}`;
  document.getElementById('modal-detail').classList.add('open');
}

// ===== ADD ASSET =====
function populateBranchSelect(){
  const sel=document.getElementById('add-branch');if(!sel)return;
  const branches=[...new Set(allAssets.map(d=>d.branch))].sort();
  sel.innerHTML='<option value="">Select Branch</option>'+branches.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('');
}
function openAddAsset(){populateBranchSelect();document.getElementById('modal-add').classList.add('open')}
async function submitNewAsset(){
  const name=document.getElementById('add-name').value.trim();
  const branch=document.getElementById('add-branch').value;
  const category=document.getElementById('add-category').value;
  const qty=parseInt(document.getElementById('add-qty').value)||1;
  if(!name||!branch||!category){toast('Please fill all required fields','error');return}
  const btn=document.getElementById('add-submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';
  try{
    // Try SharePoint, fallback to demo mode
    await getToken();
    const digestR=await fetch(`${SITE}/_api/contextinfo`,{method:'POST',headers:{'Accept':'application/json;odata=verbose','Authorization':`Bearer ${accessToken}`}});
    const digest=(await digestR.json()).d.GetContextWebInformation.FormDigestValue;
    const amount=parseFloat(document.getElementById('add-amount').value)||0;
    const body={
      "__metadata":{"type":"SP.Data.ListItem"},
      "Title":name,"AssetType":category,"Status":document.getElementById('add-status').value,
      "Color":document.getElementById('add-color').value,"SerialNumber":String(qty),
      "Model":document.getElementById('add-model').value,"PurchasePrice":amount,
      "ConditionNotes":document.getElementById('add-notes').value,
      [BRANCH_KEY]:branch
    };
    const r=await fetch(`${SITE}/_api/web/lists(guid'${LIST_ID}')/items`,{
      method:'POST',headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','Authorization':`Bearer ${accessToken}`,'X-RequestDigest':digest},
      body:JSON.stringify(body)
    });
    const d2=await r.json();
    if(d2.d?.ID){toast(`✓ Asset added #${d2.d.ID}`,'success');closeModal('modal-add');await loadAll();}
    else{toast('Add failed','error')}
  }catch(e){
    // Demo fallback: add locally
    const newId=Math.max(...allAssets.map(x=>x.id))+1;
    allAssets.unshift({id:newId,branch,brand:(branch.split(/[-–]/)[0]||'').trim(),name,category,model:document.getElementById('add-model').value,status:document.getElementById('add-status').value,color:document.getElementById('add-color').value,qty,notes:document.getElementById('add-notes').value,purchaseDate:'',amount:parseFloat(document.getElementById('add-amount').value)||0,invoice:'',photo:'',created:new Date().toISOString()});
    toast(`✓ Asset added (demo mode) #${newId}`,'success');
    closeModal('modal-add');renderTab(currentTab);
  }
  finally{btn.disabled=false;btn.textContent='Add Asset'}
}

// ===== EXPORT =====
function exportExcel(){
  const data=allAssets.map(d=>({'ID':d.id,'Name':d.name,'Branch':d.branch,'Brand':d.brand,'Category':d.category,'Model':d.model,'Qty':d.qty,'Status':d.status,'Color':d.color,'Amount SAR':d.amount,'Total SAR':d.amount*d.qty,'Invoice':d.invoice,'Purchase Date':fmtDate(d.purchaseDate),'Notes':d.notes}));
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Inventory');XLSX.writeFile(wb,`Swag_Inventory_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ Excel exported!','success');
}

// ===== THEME =====
let currentTheme='dark';
function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',currentTheme);if(currentTab==='analytics')setTimeout(renderAnalytics,100)}

// ===== MODAL CLOSE =====
function closeModal(id){document.getElementById(id)?.classList.remove('open')}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))closeModal(e.target.id)});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'))});

// ===== TOAST =====
function toast(msg,type='info'){
  const wrap=document.getElementById('toast-wrap');if(!wrap)return;
  const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;
  wrap.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='all .3s';setTimeout(()=>el.remove(),300)},3000);
}

// ===== BOOT =====
window.onload=async()=>{
  await initMsal();
  if(!msalInstance)return;
  await msalInstance.initialize();
  const resp=await msalInstance.handleRedirectPromise();
  if(resp?.account){setUser(resp.account);accessToken=resp.accessToken;showDashboard();await loadAll();return}
  const accounts=msalInstance.getAllAccounts();
  if(accounts.length>0){
    try{await getToken();showDashboard();await loadAll()}
    catch(e){/* not logged in */}
  }
  // Show demo even without login
  if(document.getElementById('login-screen').style.display!=='none'){
    // Offer demo mode button
    const card=document.querySelector('.login-card');
    const demoBtn=document.createElement('button');
    demoBtn.className='login-btn';demoBtn.style.marginTop='12px';demoBtn.style.background='rgba(139,92,246,.1)';demoBtn.style.borderColor='rgba(139,92,246,.3)';
    demoBtn.innerHTML='<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/></svg> View Demo (No Login)';
    demoBtn.onclick=()=>{currentUser={name:'Demo User',email:'demo@swag.com'};document.getElementById('user-name').textContent='Demo User';document.getElementById('user-initial').textContent='D';allAssets=DEMO_DATA;showDashboard();populateBranchSelect();renderTab('overview');buildNav()};
    card.appendChild(demoBtn);
  }
  setInterval(()=>{const tm=document.getElementById('live-time');if(tm&&!tm.textContent.includes('Sync'))tm.textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})},60000);
};
setInterval(()=>{if(document.getElementById('dashboard').style.display!=='none')loadAll()},120000);
</script>
